<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events — CODE OS Demo</title>
  <link rel="icon" href="assets/CODELogo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="events" data-layout="app">
  <div class="grid-bg"></div>
  <main class="dash-main" id="page-content">
    <header class="page-head">
      <p class="badge-pill">Fiscal <span id="events-fiscal"></span></p>
      <h1>Events</h1>
      <p>Workshops, general meetings, and hack nights.</p>
    </header>
    <div class="card-grid" id="events-grid"></div>
  </main>
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    document.getElementById("events-fiscal").textContent = CODE_DEMO.fiscal.label;
    document.getElementById("events-grid").innerHTML = CODE_DEMO.events.map((e) => `
      <article class="card hud">
        <span class="badge-pill">${e.date}</span>
        <h3>${e.title}</h3>
        <p>${e.time} · ${e.loc}</p>
        <p class="text-muted" style="margin-top:8px;">${e.rsvp} RSVPs</p>
        <button type="button" class="btn" style="margin-top:16px;" onclick="alert('Demo: RSVP recorded')">RSVP</button>
      </article>`).join("");
  </script>
</body>
</html>
