<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — CODE OS Demo</title>
  <link rel="icon" href="assets/CODELogo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="login" data-layout="public">
  <div class="grid-bg"></div>
  <main class="login-split" id="page-content">
    <div class="login-brand">
      <div style="text-align:center;max-width:360px;">
        <img src="assets/CODELogo.png" alt="" width="80" height="80" style="margin:0 auto 24px;display:block;" />
        <h1 style="font-size:2.5rem;font-weight:900;">CODE<span style="color:var(--primary)">.</span>OS</h1>
        <p class="text-muted" style="margin-top:12px;">Club management for Babson CODE</p>
      </div>
    </div>
    <div class="login-form">
      <span class="badge-pill">Auth terminal</span>
      <h1 style="font-size:1.75rem;font-weight:900;margin-bottom:24px;">Sign in</h1>
      <form onsubmit="event.preventDefault();location.href='dashboard.html'">
        <div class="form-group"><label>Email</label><input class="form-input" type="email" value="demo@babson.edu" /></div>
        <div class="form-group"><label>Password</label><input class="form-input" type="password" value="••••••••" /></div>
        <button type="submit" class="btn btn--solid" style="width:100%;justify-content:center;margin-bottom:12px;">Sign in →</button>
        <a href="dashboard.html" class="btn" style="width:100%;justify-content:center;">Continue to demo (skip auth)</a>
      </form>
      <p class="text-muted" style="margin-top:24px;text-align:center;"><a href="index.html">← Back to home</a></p>
    </div>
  </main>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
