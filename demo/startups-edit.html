<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Startup — CODE OS Demo</title>
  <link rel="icon" href="assets/CODELogo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="startups-edit" data-layout="app">
  <div class="grid-bg"></div>
  <main class="dash-main" id="page-content" style="max-width:40rem;">
    <header class="page-head">
      <p class="badge-pill">Edit listing</p>
      <h1>Edit startup</h1>
      <p>Update an approved gallery entry (demo: Nexus Analytics).</p>
    </header>
    <form class="hud" style="padding:24px;" onsubmit="event.preventDefault();alert('Demo: startup updated');location.href='startups.html'">
      <div class="form-group"><label>Startup name</label><input class="form-input" id="edit-name" /></div>
      <div class="form-group"><label>Category</label><input class="form-input" id="edit-cat" /></div>
      <div class="form-group"><label>Overview</label><textarea class="form-textarea" id="edit-overview"></textarea></div>
      <button type="submit" class="btn btn--solid">Save changes</button>
      <a href="startups.html" class="btn" style="margin-left:8px;">Cancel</a>
    </form>
  </main>
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    const s = CODE_DEMO.startups[0];
    document.getElementById("edit-name").value = s.name;
    document.getElementById("edit-cat").value = s.cat;
    document.getElementById("edit-overview").value = s.overview;
  </script>
</body>
</html>
