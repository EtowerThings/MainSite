<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — CODE OS Demo</title>
  <link rel="icon" href="assets/CODELogo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="profile" data-layout="app">
  <div class="grid-bg"></div>
  <main class="dash-main" id="page-content" style="max-width:40rem;">
    <header class="page-head">
      <p class="badge-pill">Member profile</p>
      <h1 data-demo-user-name></h1>
      <p><span data-demo-user-role></span> · Class of <span id="profile-year"></span></p>
    </header>
    <form class="hud" style="padding:24px;" onsubmit="event.preventDefault();alert('Demo: profile saved')">
      <div class="form-group"><label>Email</label><input class="form-input" id="profile-email" readonly /></div>
      <div class="form-group"><label>Bio</label><textarea class="form-textarea" id="profile-bio"></textarea></div>
      <div class="form-group"><label>LinkedIn</label><input class="form-input" id="profile-linkedin" /></div>
      <div class="form-group"><label>Skills</label><input class="form-input" id="profile-skills" /></div>
      <button type="submit" class="btn btn--solid">Save profile</button>
    </form>
  </main>
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    function fillProfile() {
      const view = localStorage.getItem("codeos-demo-view") === "admin" ? "admin" : "member";
      const u = CODE_DEMO.user[view];
      document.getElementById("profile-year").textContent = u.year;
      document.getElementById("profile-email").value = u.email;
      document.getElementById("profile-bio").value = u.bio;
      document.getElementById("profile-linkedin").value = u.linkedin;
      document.getElementById("profile-skills").value = u.skills.join(", ");
    }
    fillProfile();
    window.addEventListener("codeos-view-change", fillProfile);
  </script>
</body>
</html>
